<svg width="100%" viewBox="0 0 680 540" xmlns="http://www.w3.org/2000/svg" role="img">
<title>7-layer instruction hierarchy</title>
<desc>Layered diagram showing the 7 layers of LLM cost optimization, grouped by load frequency from per-turn (most expensive) to lazy-loaded (cheapest)</desc>
<style>
.t-bold { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; font-weight: 500; }
.t-sub { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 12px; }
.t-small { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 12px; }
</style>

<text class="t-small" x="60" y="32" fill="#5F5E5A">Cost per turn</text>
<text class="t-small" x="60" y="48" fill="#A32D2D" font-weight="500">High</text>
<text class="t-small" x="60" y="500" fill="#3B6D11" font-weight="500">Low</text>
<line x1="100" y1="40" x2="100" y2="495" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 3"/>
<polygon points="96,495 104,495 100,505" fill="#888780"/>

<rect x="120" y="40" width="540" height="60" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text class="t-bold" x="140" y="62" fill="#791F1F">L1 — Cowork project instructions</text>
<text class="t-sub" x="140" y="82" fill="#A32D2D">Loads every turn · Cowork only · Keep under 300 words</text>

<rect x="120" y="115" width="265" height="60" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="t-bold" x="140" y="137" fill="#633806">L2 — Cowork global</text>
<text class="t-sub" x="140" y="157" fill="#854F0B">Once per session · Cowork only</text>

<rect x="395" y="115" width="265" height="60" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="t-bold" x="415" y="137" fill="#633806">L3 — Code CLAUDE.md</text>
<text class="t-sub" x="415" y="157" fill="#854F0B">Once per session · Code only</text>

<rect x="120" y="185" width="540" height="60" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="t-bold" x="140" y="207" fill="#633806">L7 — Chat project instructions</text>
<text class="t-sub" x="140" y="227" fill="#854F0B">Once per session · Chat only</text>

<rect x="120" y="270" width="540" height="60" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text class="t-bold" x="140" y="292" fill="#085041">L4 — User Preferences</text>
<text class="t-sub" x="140" y="312" fill="#0F6E56">Universal across all workspaces · Most efficient layer</text>

<rect x="120" y="345" width="265" height="60" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="t-bold" x="140" y="367" fill="#3C3489">L5 — Memory</text>
<text class="t-sub" x="140" y="387" fill="#534AB7">Auto-injected · System-managed</text>

<rect x="395" y="345" width="265" height="60" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="t-bold" x="415" y="367" fill="#3C3489">L6 — Skills</text>
<text class="t-sub" x="415" y="387" fill="#534AB7">Lazy-loaded · Pay-per-use</text>

<rect x="120" y="430" width="540" height="50" rx="6" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3"/>
<text class="t-sub" x="140" y="452" font-weight="500" fill="#444441">Decision rule</text>
<text class="t-sub" x="140" y="470" fill="#5F5E5A">Universal? L4 · Cowork? L1 or L2 · Chat? L7 · Code? L3 · Trigger-based? L6</text>
</svg>
