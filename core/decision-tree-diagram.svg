<svg width="100%" viewBox="0 0 680 600" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Decision tree for placing instructions in the right layer</title>
<desc>Flowchart showing how to decide which of the 7 layers to use for any given instruction</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<style>
.t-bold { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; font-weight: 500; }
.t-sub { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 12px; }
</style>

<rect x="240" y="20" width="200" height="50" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="t-bold" x="340" y="42" text-anchor="middle" fill="#2C2C2A">New instruction</text>
<text class="t-sub" x="340" y="58" text-anchor="middle" fill="#5F5E5A">Where should it go?</text>

<rect x="200" y="100" width="280" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="t-bold" x="340" y="124" text-anchor="middle" fill="#0C447C">Universal across workspaces?</text>
<text class="t-sub" x="340" y="142" text-anchor="middle" fill="#185FA5">Same rule everywhere</text>
<line x1="340" y1="70" x2="340" y2="98" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="500" y="108" width="160" height="40" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text class="t-bold" x="580" y="132" text-anchor="middle" fill="#085041">L4 — User Prefs</text>
<line x1="480" y1="128" x2="498" y2="128" stroke="#0F6E56" stroke-width="0.5" marker-end="url(#arrow)"/>
<text class="t-sub" x="490" y="120" text-anchor="middle" fill="#0F6E56">yes</text>

<rect x="200" y="190" width="280" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="t-bold" x="340" y="214" text-anchor="middle" fill="#0C447C">Specific Chat project?</text>
<text class="t-sub" x="340" y="232" text-anchor="middle" fill="#185FA5">Project Knowledge involved</text>
<line x1="340" y1="156" x2="340" y2="188" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
<text class="t-sub" x="350" y="176" fill="#A32D2D">no</text>

<rect x="500" y="198" width="160" height="40" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="t-bold" x="580" y="222" text-anchor="middle" fill="#085041">L7 — Chat project</text>
<line x1="480" y1="218" x2="498" y2="218" stroke="#0F6E56" stroke-width="0.5" marker-end="url(#arrow)"/>
<text class="t-sub" x="490" y="210" text-anchor="middle" fill="#0F6E56">yes</text>

<rect x="200" y="280" width="280" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="t-bold" x="340" y="304" text-anchor="middle" fill="#0C447C">Cowork rule?</text>
<text class="t-sub" x="340" y="322" text-anchor="middle" fill="#185FA5">Per-project or universal Cowork</text>
<line x1="340" y1="246" x2="340" y2="278" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
<text class="t-sub" x="350" y="266" fill="#A32D2D">no</text>

<rect x="500" y="270" width="160" height="36" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="t-bold" x="580" y="292" text-anchor="middle" fill="#712B13">L1 — per project</text>
<rect x="500" y="312" width="160" height="36" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="t-bold" x="580" y="334" text-anchor="middle" fill="#633806">L2 — global</text>
<line x1="480" y1="298" x2="498" y2="288" stroke="#0F6E56" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="480" y1="316" x2="498" y2="328" stroke="#0F6E56" stroke-width="0.5" marker-end="url(#arrow)"/>
<text class="t-sub" x="490" y="306" text-anchor="middle" fill="#0F6E56">yes</text>

<rect x="200" y="370" width="280" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="t-bold" x="340" y="394" text-anchor="middle" fill="#0C447C">Claude Code project config?</text>
<text class="t-sub" x="340" y="412" text-anchor="middle" fill="#185FA5">CLI session, repo-specific</text>
<line x1="340" y1="336" x2="340" y2="368" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
<text class="t-sub" x="350" y="356" fill="#A32D2D">no</text>

<rect x="500" y="378" width="160" height="40" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="t-bold" x="580" y="402" text-anchor="middle" fill="#085041">L3 — CLAUDE.md</text>
<line x1="480" y1="398" x2="498" y2="398" stroke="#0F6E56" stroke-width="0.5" marker-end="url(#arrow)"/>
<text class="t-sub" x="490" y="390" text-anchor="middle" fill="#0F6E56">yes</text>

<rect x="200" y="460" width="280" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="t-bold" x="340" y="484" text-anchor="middle" fill="#0C447C">Pattern triggered by keywords?</text>
<text class="t-sub" x="340" y="502" text-anchor="middle" fill="#185FA5">Auto-fires on certain phrases</text>
<line x1="340" y1="426" x2="340" y2="458" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
<text class="t-sub" x="350" y="446" fill="#A32D2D">no</text>

<rect x="500" y="468" width="160" height="40" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="t-bold" x="580" y="492" text-anchor="middle" fill="#3C3489">L6 — Skill</text>
<line x1="480" y1="488" x2="498" y2="488" stroke="#0F6E56" stroke-width="0.5" marker-end="url(#arrow)"/>
<text class="t-sub" x="490" y="480" text-anchor="middle" fill="#0F6E56">yes</text>

<rect x="120" y="540" width="440" height="40" rx="6" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3"/>
<text class="t-sub" x="340" y="558" text-anchor="middle" font-weight="500" fill="#444441">Default fallback</text>
<text class="t-sub" x="340" y="572" text-anchor="middle" fill="#5F5E5A">If unclear after all questions, use L4 — universal applies broadly at low cost</text>
</svg>
